<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="কৃষক প্ল্যাটফর্মে রেজিস্ট্রেশন করুন - কৃষক বা ক্রেতা হিসেবে">
    <title>রেজিস্ট্রেশন — কৃষক</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">🌾</span>
                <span class="logo-text">কৃষক</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">হোম</a>
                <a href="products.html" class="nav-link">পণ্যসমূহ</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-ghost">লগইন</a>
                <a href="register.html" class="btn btn-primary active">রেজিস্টার</a>
            </div>
            <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Desktop Side Panel -->
                <div class="auth-side-panel">
                    <div class="side-panel-content">
                        <span class="side-logo-icon">🌾</span>
                        <h2>আমাদের সাথে যোগ দিন</h2>
                        <p>আপনার অ্যাকাউন্ট তৈরি করে আজই কৃষক প্ল্যাটফর্মের সুবিধা গ্রহণ করুন। সরাসরি বিক্রি বা তাজা পণ্য কেনার সুযোগ পান!</p>
                    </div>
                </div>

                <!-- Form Area -->
                <div class="auth-form-area">
                    <div class="auth-header">
                        <span class="logo-icon mobile-only">🌾</span>
                        <h1>অ্যাকাউন্ট তৈরি করুন</h1>
                        <p>কৃষক বা ক্রেতা হিসেবে যোগ দিন</p>
                    </div>
                    <div class="auth-body">
                    <!-- Role tabs -->
                    <div class="role-tabs">
                        <button class="role-tab active" data-role="farmer" onclick="switchRegRole('farmer')">🧑‍🌾 কৃষক</button>
                        <button class="role-tab" data-role="customer" onclick="switchRegRole('customer')">🛒 ক্রেতা</button>
                    </div>

                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <input type="hidden" id="regRole" value="farmer">

                        <div class="form-group">
                            <label class="form-label" for="regName">নাম *</label>
                            <input type="text" id="regName" class="form-input" placeholder="আপনার নাম" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="regPhone">ফোন নম্বর *</label>
                            <input type="text" id="regPhone" class="form-input" placeholder="01XXXXXXXXX" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="regEmail">ইমেইল *</label>
                            <input type="email" id="regEmail" class="form-input" placeholder="example@gmail.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="regPassword">পাসওয়ার্ড *</label>
                            <div class="password-wrapper">
                                <input type="password" id="regPassword" class="form-input" placeholder="কমপক্ষে ৬ অক্ষর" required minlength="6">
                                <button type="button" class="password-toggle" id="toggleRegPass" onclick="togglePassword('regPassword', 'toggleRegPass')">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="regConfirmPassword">পাসওয়ার্ড নিশ্চিত করুন *</label>
                            <div class="password-wrapper">
                                <input type="password" id="regConfirmPassword" class="form-input" placeholder="কমপক্ষে ৬ অক্ষর" required minlength="6">
                            </div>
                        </div>

                        <!-- Farmer specific fields -->
                        <div class="conditional-fields show" id="farmerFields">
                            <div class="form-group">
                                <label class="form-label" for="regFarmName">খামারের নাম *</label>
                                <input type="text" id="regFarmName" class="form-input" placeholder="আপনার খামারের নাম">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="regFarmAddress">খামারের ঠিকানা *</label>
                                <input type="text" id="regFarmAddress" class="form-input" placeholder="খামারের ঠিকানা">
                            </div>
                        </div>

                        <!-- Customer specific fields -->
                        <div class="conditional-fields" id="customerFields">
                            <div class="form-group">
                                <label class="form-label" for="regAddress">ঠিকানা</label>
                                <input type="text" id="regAddress" class="form-input" placeholder="আপনার ঠিকানা">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg btn-full" id="regSubmitBtn">
                            রেজিস্ট্রেশন সম্পন্ন করুন
                        </button>
                    </form>
                </div>
                <div class="auth-footer">
                    অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a>
                </div>
            </div> <!-- End auth-form-area -->
            </div> <!-- End auth-card -->
        </div> <!-- End auth-container -->
    </div> <!-- End auth-page -->

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Check URL param for pre-selected role
        const urlParams = new URLSearchParams(window.location.search);
        const preRole = urlParams.get('role');
        if (preRole === 'customer' || preRole === 'farmer') {
            switchRegRole(preRole);
        }

        function switchRegRole(role) {
            document.getElementById('regRole').value = role;
            document.querySelectorAll('.role-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.role === role);
            });

            document.getElementById('farmerFields').classList.toggle('show', role === 'farmer');
            document.getElementById('customerFields').classList.toggle('show', role === 'customer');
        }

        const ICONS = {
            eye: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>`,
            eyeOff: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`
        };

        function togglePassword(inputId, btnId) {
            const input = document.getElementById(inputId);
            const btn = document.getElementById(btnId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = ICONS.eyeOff;
            } else {
                input.type = 'password';
                btn.innerHTML = ICONS.eye;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('regSubmitBtn');
            const role = document.getElementById('regRole').value;
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!name || !phone || !email || !password || !confirmPassword) {
                Toast.error('সব আবশ্যক ফিল্ড পূরণ করুন!');
                return;
            }

            if (password.length < 6) {
                Toast.error('পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!');
                return;
            }

            if (password !== confirmPassword) {
                Toast.error('পাসওয়ার্ড মিলছে না!');
                return;
            }

            setLoading(submitBtn, true);

            try {
                let body, url;

                if (role === 'farmer') {
                    const farmName = document.getElementById('regFarmName').value.trim();
                    const farmAddress = document.getElementById('regFarmAddress').value.trim();
                    if (!farmName || !farmAddress) {
                        throw new Error('খামারের নাম ও ঠিকানা দিতে হবে!');
                    }
                    body = { name, phone, email, password, farm_name: farmName, farm_address: farmAddress, latitude: null, longitude: null };
                    url = API.FARMER_REGISTER;
                } else {
                    const address = document.getElementById('regAddress').value.trim();
                    body = { name, phone, email, password, address, latitude: null, longitude: null };
                    url = API.CUSTOMER_REGISTER;
                }

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'রেজিস্ট্রেশন ব্যর্থ হয়েছে');
                }

                Toast.success('সফলভাবে রেজিস্ট্রেশন হয়েছে! এখন লগইন করুন।');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (err) {
                Toast.error(err.message);
            } finally {
                setLoading(submitBtn, false);
            }
        }

        // Auto-redirect if already logged in
        if (Auth.isLoggedIn() && !Auth.isTokenExpired()) {
            const role = Auth.getUserRole();
            const dashMap = { farmer: 'farmer-dashboard.html', customer: 'customer-dashboard.html', admin: 'admin-dashboard.html' };
            window.location.href = dashMap[role] || 'index.html';
        }
    </script>
</body>
</html>
